<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LandWatch — Home</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F5F4F0;--surface:#FFF;--border:#E6E4DE;--text:#181815;--sub:#82807A;--accent:#2B6651;--accent-light:#E8F2ED;--gold:#8A6F2E;--gold-light:#FDF6E3;--r:14px;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;}
.logo{font-family:'DM Serif Display',serif;font-size:36px;color:var(--accent);margin-bottom:4px;}
.logo span{color:var(--text);}
.tagline{font-size:14px;color:var(--sub);margin-bottom:48px;text-align:center;}
.cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px;}
.portal-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:22px 20px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:16px;box-shadow:0 2px 10px rgba(0,0,0,.055);}
.portal-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1);}
.portal-icon{font-size:32px;flex-shrink:0;}
.portal-title{font-size:16px;font-weight:700;}
.portal-sub{font-size:12px;color:var(--sub);margin-top:3px;line-height:1.5;}
.portal-arrow{font-size:18px;color:var(--sub);margin-left:auto;flex-shrink:0;}
.portal-card.client{border-color:var(--gold);}
.portal-card.client:hover{background:var(--gold-light);}
.portal-card.watcher{border-color:var(--accent);}
.portal-card.watcher:hover{background:var(--accent-light);}
.portal-card.signup{border-color:var(--border);}
.portal-card.signup:hover{background:#f0f0ec;}
.divider{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;text-align:center;margin:4px 0;}
</style>
</head>
<body>
<div class="logo">Land<span>Watch</span></div>
<div class="tagline">Your land. Always watched.</div>

<div class="cards">
  <div class="portal-card client" onclick="window.location.href='landwatch-client.html'">
    <div class="portal-icon">👤</div>
    <div>
      <div class="portal-title">Client Login</div>
      <div class="portal-sub">View your land, photos, alerts & live camera</div>
    </div>
    <div class="portal-arrow">→</div>
  </div>

  <div class="portal-card watcher" onclick="window.location.href='landwatch-watcher.html'">
    <div class="portal-icon">🛡️</div>
    <div>
      <div class="portal-title">Watcher Login</div>
      <div class="portal-sub">Manage clients, upload photos & send alerts</div>
    </div>
    <div class="portal-arrow">→</div>
  </div>

  <div class="divider">— New here? —</div>

  <div class="portal-card signup" onclick="window.location.href='landwatch-signup.html'">
    <div class="portal-icon">🌱</div>
    <div>
      <div class="portal-title">Register as Client</div>
      <div class="portal-sub">Choose a plan and get your login code</div>
    </div>
    <div class="portal-arrow">→</div>
  </div>
</div>
</body>
</html>
